<div class="dt-toolbar">
  @if (enabled()) {
    <div class="dt-search-group">
      <input
        class="dt-input"
        type="text"
        [placeholder]="i18n().search"
        [value]="query()"
        (input)="onInput($any($event.target).value)"
      />

      @if (showClear()) {
        <button type="button" class="dt-btn" (click)="onClear()">{{ i18n().clear }}</button>
      }
    </div>
  }

  @if (refreshConfig()?.enabled) {
    <div class="dt-refresh-group">
      <button
        type="button"
        class="dt-btn dt-refresh-btn"
        [class.is-active]="selectedInterval() !== null"
        [title]="i18n().refresh"
        [attr.aria-label]="i18n().refresh"
        (click)="onRefresh()"
      >
        <span class="dt-refresh-icon" [innerHTML]="refreshSvg"></span>
      </button>

      <div class="dt-refresh-select-wrap">
        <label class="dt-refresh-label">{{ i18n().autoRefresh }}</label>
        <select class="dt-select" (change)="onIntervalChange($any($event.target).value)">
          <option value="" [selected]="selectedInterval() === null">{{ i18n().refreshOff }}</option>
          @for (interval of refreshIntervals(); track interval) {
            <option [value]="interval" [selected]="selectedInterval() === interval">
              {{ formatInterval(interval) }}
            </option>
          }
        </select>
      </div>
    </div>
  }

  @if (columnVisibility()) {
    <div class="dt-columns-wrap">
      <button
        type="button"
        class="dt-btn dt-columns-btn"
        [class.is-active]="hasHiddenColumns()"
        [attr.aria-label]="i18n().columns"
        [attr.aria-expanded]="panelOpen()"
        (click)="togglePanel()"
      >
        <span class="dt-columns-icon" [innerHTML]="columnsSvg"></span>
        <span class="dt-columns-label">{{ i18n().columns }}</span>
        @if (hasHiddenColumns()) {
          <span class="dt-columns-badge">{{ hiddenCount() }}</span>
        }
      </button>

      @if (panelOpen()) {
        <div class="dt-columns-panel" role="dialog" [attr.aria-label]="i18n().columns">
          <ul class="dt-columns-list" role="list">
            @for (col of columnsForToggle(); track col.key) {
              <li class="dt-columns-item">
                <label
                  class="dt-columns-item-label"
                  [class.is-disabled]="col.visible && onlyOneVisible()"
                >
                  <input
                    type="checkbox"
                    class="dt-columns-checkbox"
                    [checked]="col.visible"
                    [disabled]="col.visible && onlyOneVisible()"
                    (change)="onColumnToggle(col.key, col.visible)"
                  />
                  <span>{{ col.label }}</span>
                </label>
              </li>
            }
          </ul>

          @if (hasHiddenColumns()) {
            <div class="dt-columns-footer">
              <button type="button" class="dt-columns-reset" (click)="onColumnReset()">
                {{ i18n().resetColumns }}
              </button>
            </div>
          }

          @if (!hasHiddenColumns()) {
            <p class="dt-columns-all-visible">{{ i18n().allColumnsVisible }}</p>
          }
        </div>
      }
    </div>
  }
</div>
